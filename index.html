<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Streaming Top 10</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --accent:#7C6CF0; --accent-dim:#564A9E;
    --bg:transparent;
    --ink:#F1EEFB; --ink-dim:#AFA8C9;
    --dim:#766E92;
    --rule:rgba(241,238,251,0.12);

    /* platform badge colors */
    --netflix:#E50914; --hbomax:#9B5DE5; --disney:#1492FF;
    --prime:#00A8E1; --appletv:#FFFFFF;
  }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:transparent;
    font-family:'Inter',sans-serif; color:var(--ink);
  }

  .stage {
    width:100%; height:100%;
    display:flex; flex-direction:column;
    background:transparent;
  }

  /* ── MASTHEAD ── */
  .masthead {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:3% 6% 2%;
    flex-shrink:0;
  }
  .masthead-title {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(32px, 4.2vw, 40px);
    letter-spacing:0.03em;
    color:var(--accent);
    line-height:1;
  }
  .masthead-sub {
    font-size:clamp(16px, 1.5vw, 15px);
    color:var(--dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:0.4em;
  }
  .masthead-date {
    font-size:clamp(16px, 1.6vw, 16px);
    color:var(--ink-dim);
    text-align:right;
    white-space:nowrap;
  }

  .status-line {
    padding:0 6% 2%;
    font-size:clamp(13px, 1.1vw, 12px);
    color:var(--accent-dim);
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  .status-line.error { color:var(--netflix); }

  /* ── SCROLL AREA ── */
  .scroll-wrapper { flex:1; overflow:hidden; position:relative; }
  .scroll-track { display:flex; flex-direction:column; }

  /* ── ENTRY ROW ── */
  .entry-row {
    display:flex; align-items:center; gap:4%;
    padding:1.5% 6%;
    position:relative;
  }
  .entry-row::after {
    content:"";
    position:absolute; left:6%; right:6%; bottom:0;
    height:1px;
    background:var(--rule);
  }

  .rank-block {
    flex-shrink:0;
    width:10%;
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(34px, 5.6vw, 48px);
    color:var(--accent);
    line-height:0.9;
    text-align:center;
  }

  .poster-block { display:none; }

  .entry-info {
    flex:1; min-width:0;
    display:flex; flex-direction:column; gap:0.35em;
  }
  .entry-title {
    font-size:clamp(20px, 2.5vw, 24px);
    font-weight:700;
    color:var(--ink);
    line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .entry-meta {
    display:flex; align-items:center; gap:0.5em;
  }
  .platform-badge {
    flex-shrink:0;
    font-size:clamp(13px, 1.2vw, 12px);
    font-weight:700;
    letter-spacing:0.03em;
    padding:0.2em 0.65em;
    border-radius:3px;
    color:#0E0B1A;
  }
  .platform-badge.netflix { background:var(--netflix); color:#fff; }
  .platform-badge.hbomax  { background:var(--hbomax); color:#fff; }
  .platform-badge.disney  { background:var(--disney); color:#fff; }
  .platform-badge.prime   { background:var(--prime); color:#0E0B1A; }
  .platform-badge.appletv { background:var(--appletv); color:#0E0B1A; }
  .category-tag {
    font-size:clamp(13px, 1.2vw, 12px);
    color:var(--dim);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="masthead">
    <div>
      <div class="masthead-title">STREAMING</div>
      <div class="masthead-sub">Top 10 Across Platforms</div>
    </div>
    <div class="masthead-date" id="chartDate">—</div>
  </div>
  <div class="status-line" id="statusLine">Loading…</div>

  <div class="scroll-wrapper">
    <div class="scroll-track" id="scrollTrack"></div>
  </div>
</div>

<script>
/* ── CONFIG ──
   Replace OWNER/REPO with your GitHub username and repo name, pointing at
   the raw JSON file kept up to date by the GitHub Action
   (see .github/workflows/update-streaming.yml + scripts/fetch_streaming.py). */
const DATA_URL = "https://raw.githubusercontent.com/nancyamedeo-rgb/top-streaming/main/data/streaming.json";

const SCROLL_SPEED = 0.4; // px per frame, matches the other Dakboard widgets' pace

const PLATFORM_CLASS = {
  "Netflix": "netflix",
  "HBO Max": "hbomax",
  "Disney+": "disney",
  "Amazon Prime": "prime",
  "Apple TV": "appletv",
};

function buildEntryRow(entry) {
  const badgeCls = PLATFORM_CLASS[entry.platform] || "";

  return `<div class="entry-row">
    <div class="rank-block">${entry.rank}</div>
    <div class="entry-info">
      <div class="entry-title">${entry.title}</div>
      <div class="entry-meta">
        <span class="platform-badge ${badgeCls}">${entry.platform}</span>
        <span class="category-tag">${entry.category === 'tv' ? 'Series' : 'Movie'}</span>
      </div>
    </div>
  </div>`;
}

let scrollPos = 0, scrollRAF = null;
function startScroll() {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  const track = document.getElementById("scrollTrack");
  const half = track.scrollHeight / 2;
  if (half <= 0) return;
  function step() {
    scrollPos += SCROLL_SPEED;
    if (scrollPos >= half) scrollPos = 0;
    track.style.transform = "translateY(-" + scrollPos + "px)";
    scrollRAF = requestAnimationFrame(step);
  }
  scrollRAF = requestAnimationFrame(step);
}

function setStatus(msg, isError) {
  const el = document.getElementById("statusLine");
  el.textContent = msg;
  el.className = "status-line" + (isError ? " error" : "");
}

async function fetchStreaming() {
  setStatus("Fetching latest chart…", false);
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("Fetch failed: HTTP " + res.status);
    const data = await res.json();

    if (data.status === "error" || !data.entries || data.entries.length === 0) {
      throw new Error(data.lastError || "No streaming data available yet");
    }

    document.getElementById("chartDate").textContent = data.chartDate || "";

    const track = document.getElementById("scrollTrack");
    const rowsHtml = data.entries.map(buildEntryRow).join("");
    track.innerHTML = rowsHtml + rowsHtml; // duplicate for seamless loop
    startScroll();

    const updated = data.updatedAt ? new Date(data.updatedAt) : new Date();
    const label = data.status === "stale"
      ? "Showing cached data from " + updated.toLocaleTimeString()
      : "Updated " + updated.toLocaleTimeString();
    setStatus(label, data.status === "stale");
  } catch (e) {
    console.error("Streaming fetch error:", e);
    setStatus("Update failed — showing last data", true);
  }
}

fetchStreaming();
setInterval(fetchStreaming, 60 * 60 * 1000);   // poll hourly; data itself updates daily
setTimeout(() => location.reload(), 12 * 60 * 60 * 1000); // safety-net reload twice a day
</script>
</body>
</html>
