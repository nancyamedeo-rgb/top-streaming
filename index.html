<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Streaming Now</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, html { background: transparent; }

  #widget {
    width: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    position: relative;
    height: 520px;
    color: white;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 12px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.18);
    margin-bottom: 6px;
  }
  .header-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #e50914, #b81d24);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .header-title {
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    flex: 1;
  }
  .header-date { font-size: 11px; color: rgba(255,255,255,0.35); }

  .scroll-viewport { overflow: hidden; height: 466px; position: relative; }
  .scroll-track { display: flex; flex-direction: column; }

  .stream-row {
    display: flex;
    align-items: center;
    padding: 9px 0;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    gap: 11px;
    flex-shrink: 0;
    min-height: 60px;
  }

  .rank {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.28);
    width: 22px; text-align: right; flex-shrink: 0;
  }
  .rank.top3 { color: #f5c518; }

  .swatch {
    width: 38px; height: 38px;
    border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.85);
  }

  .info { flex: 1; min-width: 0; }
  .title {
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.92);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.3;
  }
  .meta {
    font-size: 11px; color: rgba(255,255,255,0.38);
    margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .service-pill {
    font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 3px;
    letter-spacing: 0.04em; flex-shrink: 0;
    text-transform: uppercase;
  }
  .svc-netflix    { background: rgba(229,9,20,0.25);   color: #ff6b6b; border: 1px solid rgba(229,9,20,0.4); }
  .svc-hbo        { background: rgba(122,80,205,0.25); color: #b09cf5; border: 1px solid rgba(122,80,205,0.4); }
  .svc-disney     { background: rgba(17,60,219,0.25);  color: #6b9fff; border: 1px solid rgba(17,60,219,0.4); }
  .svc-prime      { background: rgba(0,168,225,0.2);   color: #5dd3f5; border: 1px solid rgba(0,168,225,0.35); }
  .svc-hulu       { background: rgba(28,231,131,0.18); color: #3df5a0; border: 1px solid rgba(28,231,131,0.3); }
  .svc-apple      { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); }
  .svc-paramount  { background: rgba(0,112,201,0.22);  color: #5ab4ff; border: 1px solid rgba(0,112,201,0.35); }
  .svc-peacock    { background: rgba(255,130,0,0.2);   color: #ffaa55; border: 1px solid rgba(255,130,0,0.35); }
  .svc-amc        { background: rgba(180,20,20,0.2);   color: #ff9090; border: 1px solid rgba(180,20,20,0.35); }

  .type-badge {
    font-size: 9px; font-weight: 600;
    padding: 2px 5px; border-radius: 3px;
    margin-left: 5px; vertical-align: middle;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .type-new { background: rgba(245,197,24,0.18); color: #f5c518; }
</style>
</head>
<body>

<div id="widget">
  <div class="header">
    <div class="header-icon">▶</div>
    <span class="header-title">Top 50 Streaming Now</span>
    <span class="header-date" id="week-label"></span>

  <div class="scroll-viewport">

  { title: "The Capture S3",                  service: "peacock",   type: "Series",  genre: "Conspiracy",     isNew: true  },

  { title: "Legends S1",                      service: "prime",     type: "Series",  genre: "Sports Drama",   isNew: false },

  { title: "The Crash",                       service: "netflix",   type: "Movie",   genre: "Thriller",       isNew: false },

  { title: "Life, Larry & the Pursuit of…",   service: "hbo",       type: "Limited", genre: "Comedy",         isNew: true  },
  { title: "USA 94: Brazil's Return",         service: "netflix",   type: "Doc",     genre: "Sports",         isNew: true  },

const SWATCHES = [
  '#8B1A1A','#1a3a6b','#1a4a2e','#4a1a6b','#6b3a1a',
  '#1a4a4a','#4a3a1a','#2a1a4a','#1a2a4a','#4a1a3a',
  '#2a4a1a','#6b1a4a','#1a6b4a','#4a2a1a','#1a1a6b',
  '#6b4a1a','#1a4a6b','#4a6b1a','#6b1a1a','#1a6b1a',
  '#3a1a6b','#6b6b1a','#1a3a3a','#6b1a6b','#3a6b1a',
  '#1a6b6b','#6b3a3a','#3a3a6b','#6b6b3a','#3a6b6b',
  '#8B3A1A','#1a5a2e','#5a1a6b','#1a5a5a','#5a3a1a',
  '#2a5a1a','#5a1a3a','#1a2a5a','#5a2a4a','#2a4a5a',
  '#7a1a2a','#1a7a3a','#3a1a7a','#7a4a1a','#1a4a7a',
  '#4a7a1a','#7a1a5a','#1a5a7a','#7a5a1a','#1a7a5a',
];

function getInitials(title) {
  return title.replace(/\s+S\d+.*$/,'').split(' ').slice(0,2).map(w => w[0] || '').join('').toUpperCase() || '▶';
}

function svcClass(s) { return 'svc-' + s; }

function svcLabel(s) {
  return { netflix:'Netflix', hbo:'Max', disney:'Disney+', prime:'Prime', hulu:'Hulu',
           apple:'Apple TV+', paramount:'Paramount+', peacock:'Peacock', amc:'AMC+' }[s] || s;
}

function buildRows(items) {
  return items.map((item, i) => {
    const rank = i + 1;
    const top3 = rank <= 3 ? ' top3' : '';
    const swatch = SWATCHES[i % SWATCHES.length];
    const initials = getInitials(item.title);
    const newBadge = item.isNew ? '<span class="type-badge type-new">New</span>' : '';
    return `<div class="stream-row">
      <div class="rank${top3}">${rank}</div>
      <div class="swatch" style="background:${swatch}">${initials}</div>
      <div class="info">
        <div class="title">${item.title}${newBadge}</div>
        <div class="meta">${item.type} · ${item.genre}</div>
      </div>
      <span class="service-pill ${svcClass(item.service)}">${svcLabel(item.service)}</span>
    </div>`;
  }).join('');
}

let animFrame;
function startScroll(count) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const track = document.getElementById('scroll-track');
  const ROW_H = 60;
  const totalH = ROW_H * count;
  let pos = 0, last = null;
  const SPEED = 0.38;
  function step(ts) {
    if (last !== null) pos += (ts - last) * SPEED / 1000 * 60;
    last = ts;
    if (pos >= totalH) pos -= totalH;
    track.style.transform = `translateY(-${pos}px)`;
    animFrame = requestAnimationFrame(step);
  }
  animFrame = requestAnimationFrame(step);
}

document.addEventListener('DOMContentLoaded', () => {
  const vp = document.querySelector('.scroll-viewport');
  vp.addEventListener('mouseenter', () => { if (animFrame) cancelAnimationFrame(animFrame); animFrame = null; });
  vp.addEventListener('mouseleave', () => startScroll(STREAMING.length));
});

function init() {
  const now = new Date();
  document.getElementById('week-label').textContent =
    'Week of ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const track = document.getElementById('scroll-track');
  const html = buildRows(STREAMING);
  track.innerHTML = html + html;
  startScroll(STREAMING.length);
}

init();
</script>

</html>
